<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSK 5급 단어 공부</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="lang-selector" id="lang-selector">
  <button class="lang-btn" data-lang="ko" type="button">한</button>
  <button class="lang-btn" data-lang="ja" type="button">日</button>
  <button class="lang-btn" data-lang="en" type="button">EN</button>
</div>

<div id="app">

  <section id="home" class="screen active">
    <h1 data-i18n="siteTitle">HSK 5급 단어 공부</h1>
    <p class="subtitle" data-i18n="subtitle">기초(1~4급) 1193단어 · 5급 1298단어</p>
    <div class="menu">
      <button class="menu-btn" data-action="study-basic">
        <span class="big" data-i18n="menuStudyBasicBig">기초 단어 학습</span>
        <span class="small" data-i18n="menuStudyBasicSmall" data-i18n-vars="basic-count">HSK 1~4급 · <span id="basic-count">0</span>단어</span>
      </button>
      <button class="menu-btn primary" data-action="study-5">
        <span class="big" data-i18n="menuStudy5Big">5급 단어 학습</span>
        <span class="small" data-i18n="menuStudy5Small" data-i18n-vars="hsk5-count">HSK 5급 · <span id="hsk5-count">0</span>단어</span>
      </button>
      <button class="menu-btn" data-action="quiz-basic">
        <span class="big" data-i18n="menuQuizBasicBig">기초 단어 퀴즈</span>
        <span class="small" data-i18n="menuQuizBasicSmall">HSK 1~4급</span>
      </button>
      <button class="menu-btn" data-action="quiz-5">
        <span class="big" data-i18n="menuQuiz5Big">5급 단어 퀴즈</span>
        <span class="small" data-i18n="menuQuiz5Small">HSK 5급</span>
      </button>
      <button class="menu-btn warn" data-action="review">
        <span class="big" data-i18n="menuReviewBig">오답 복습</span>
        <span class="small" data-i18n="menuReviewSmall" data-i18n-vars="wrong-count">틀린 단어 <span id="wrong-count">0</span>개</span>
      </button>
      <button class="menu-btn ghost" data-action="settings">
        <span class="big" data-i18n="menuSettingsBig">설정</span>
        <span class="small" data-i18n="menuSettingsSmall" data-i18n-vars="settings-display">하루 학습 단어 수: <span id="settings-display">10</span>개</span>
      </button>
    </div>
  </section>

  <section id="study" class="screen">
    <header class="bar">
      <button class="back" data-action="home" data-i18n="back">← 메인</button>
      <span class="progress" id="study-progress">1 / 10</span>
    </header>
    <div class="card flashcard">
      <div class="level-tag" id="study-level">HSK 1</div>
      <button class="audio-btn" id="study-audio" data-i18n-attr-title="audioLabel" data-i18n-attr-aria-label="audioLabel" title="발음 듣기" aria-label="발음 듣기">🔊</button>
      <div class="hanzi" id="study-hanzi">字</div>
      <div class="pinyin" id="study-pinyin">zì</div>
      <div class="meaning" id="study-meaning">뜻</div>
      <div class="reveal-example" id="study-example"></div>
    </div>
    <div class="controls">
      <button id="study-prev" data-i18n="prev">← 이전</button>
      <button id="study-next" class="primary" data-i18n="next">다음 →</button>
    </div>
  </section>

  <section id="quiz" class="screen">
    <header class="bar">
      <button class="back" data-action="home" data-i18n="back">← 메인</button>
      <span class="progress" id="quiz-progress">1 / 10</span>
      <span class="score"><span data-i18n="score">점수</span>: <span id="quiz-score">0</span></span>
    </header>
    <div class="card" id="quiz-card">
      <div class="level-tag" id="quiz-level">HSK 1</div>
      <div class="result-badge hidden" id="quiz-result-badge"></div>
      <button class="audio-btn" id="quiz-audio" data-i18n-attr-title="audioLabel" data-i18n-attr-aria-label="audioLabel" title="발음 듣기" aria-label="발음 듣기">🔊</button>
      <div class="hanzi" id="quiz-hanzi">字</div>
      <div class="pinyin" id="quiz-pinyin">zì</div>
      <div class="reveal hidden" id="quiz-reveal">
        <div class="reveal-meaning" id="quiz-reveal-meaning"></div>
        <div class="reveal-example" id="quiz-reveal-example"></div>
      </div>
    </div>
    <div class="quiz-options" id="quiz-options"></div>
    <button id="quiz-next" class="primary hidden" data-i18n="next">다음 →</button>
  </section>

  <section id="quiz-result" class="screen">
    <h1 data-i18n="resultTitle">퀴즈 완료</h1>
    <div class="result-card">
      <div class="result-row">
        <span class="label" data-i18n="resultCorrect">맞은 개수</span>
        <span class="value good"><span id="result-correct">0</span> / <span id="result-total">0</span></span>
      </div>
      <div class="result-row">
        <span class="label" data-i18n="resultRate">정답률</span>
        <span class="value" id="result-rate">0%</span>
      </div>
      <div class="result-row">
        <span class="label" data-i18n="resultWrongAdded">오답 노트 추가</span>
        <span class="value warn"><span id="result-wrong">0</span><span data-i18n="resultUnitCount" data-i18n-vars="" id="result-wrong-unit">개</span></span>
      </div>
    </div>
    <button class="primary" data-action="home" data-i18n="main">메인으로</button>
  </section>

  <section id="review" class="screen">
    <header class="bar">
      <button class="back" data-action="home" data-i18n="back">← 메인</button>
      <h2 data-i18n="reviewTitle">오답 복습</h2>
    </header>
    <div class="review-actions">
      <button id="review-quiz" class="primary" data-i18n="reviewQuizBtn">오답으로 퀴즈 풀기</button>
      <button id="review-clear" class="danger" data-i18n="reviewClearBtn">전체 삭제</button>
    </div>
    <div id="review-list" class="review-list"></div>
  </section>

  <section id="settings" class="screen">
    <header class="bar">
      <button class="back" data-action="home" data-i18n="back">← 메인</button>
      <h2 data-i18n="settingsTitle">설정</h2>
    </header>
    <div class="setting-item">
      <label for="lang-select" data-i18n="settingsLanguage">언어 (Language)</label>
      <select id="lang-select">
        <option value="ko">한국어</option>
        <option value="ja">日本語</option>
        <option value="en">English</option>
      </select>
      <p class="hint" data-i18n="settingsLanguageHint">사이트 표시 언어를 선택하세요</p>
    </div>
    <div class="setting-item">
      <label for="daily-count" data-i18n="settingsDaily">하루 학습 단어 수</label>
      <select id="daily-count">
        <option value="10">10</option>
        <option value="20">20</option>
        <option value="30">30</option>
        <option value="40">40</option>
        <option value="50">50</option>
        <option value="60">60</option>
        <option value="70">70</option>
        <option value="80">80</option>
        <option value="90">90</option>
        <option value="100">100</option>
        <option value="150">150</option>
        <option value="200">200</option>
      </select>
      <p class="hint" data-i18n="settingsDailyHint">한 번에 공부할 단어 수입니다</p>
    </div>
    <div class="setting-item">
      <label for="quiz-direction" data-i18n="settingsDirection">퀴즈 방향</label>
      <select id="quiz-direction">
        <option value="hanzi-to-meaning" data-i18n="settingsDirHanziMeaning">한자 → 뜻 (한자를 보고 뜻 고르기)</option>
        <option value="meaning-to-hanzi" data-i18n="settingsDirMeaningHanzi">뜻 → 한자 (뜻을 보고 한자 고르기)</option>
      </select>
    </div>
    <div class="setting-item">
      <label for="auto-speak" data-i18n="settingsAutoSpeak">학습 시 자동 발음 재생</label>
      <select id="auto-speak">
        <option value="on" data-i18n="settingsAutoSpeakOn">켜기 (단어가 바뀔 때 자동 재생)</option>
        <option value="off" data-i18n="settingsAutoSpeakOff">끄기 (🔊 버튼 눌렀을 때만 재생)</option>
      </select>
      <p class="hint" data-i18n="settingsAutoSpeakHint">Web Speech API 사용. 브라우저에 중국어 음성이 설치돼 있어야 합니다.</p>
    </div>
    <div class="setting-item">
      <label for="font-size" data-i18n="settingsFontSize">글자 크기</label>
      <select id="font-size">
        <option value="s" data-i18n="settingsFontSmall">작게</option>
        <option value="m" data-i18n="settingsFontMedium">보통</option>
        <option value="l" data-i18n="settingsFontLarge">크게</option>
        <option value="xl" data-i18n="settingsFontXLarge">아주 크게</option>
      </select>
      <p class="hint" data-i18n="settingsFontSizeHint">한자·병음·뜻·예문·퀴즈 보기의 글자 크기를 조절합니다</p>
    </div>
    <div class="setting-item">
      <label data-i18n="settingsResetLabel">학습 진도 초기화</label>
      <button id="reset-progress" class="danger" data-i18n="settingsResetBtn">학습한 단어 기록 초기화</button>
      <p class="hint" data-i18n="settingsResetHint">학습한 단어를 다시 처음부터 보고 싶을 때 사용하세요</p>
    </div>
    <button id="save-settings" class="primary" data-i18n="settingsSave">저장</button>
  </section>

</div>
<script src="vocabulary.js"></script>
<script src="translations.js"></script>
<script src="translations_ja.js"></script>
<script src="examples.js"></script>
<script src="examples_en.js"></script>
<script src="examples_ja.js"></script>
<script src="i18n.js"></script>
<script src="app.js"></script>
</body>
</html>
